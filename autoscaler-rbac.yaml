apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-autoscaler
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-autoscaler-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-autoscaler-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: mongodb-autoscaler
    namespace: default
roleRef:
  kind: Role
  name: mongodb-autoscaler-role
  apiGroup: rbac.authorization.k8s.io