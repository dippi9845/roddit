apiVersion: v1
kind: ServiceAccount
metadata:
  name: mongodb-autoscaler
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mongodb-autoscaler-role
  namespace: default
rules:
  # StatefulSet: legge quelli esistenti e ne crea di nuovi per i nuovi shard
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  # Service: crea i Headless Service per ogni nuovo shard
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create"]
  # Pod: attende che i pod dei nuovi shard siano Ready
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # PVC: lettura per monitoraggio (scale down non gestito)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mongodb-autoscaler-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: mongodb-autoscaler
    namespace: default
roleRef:
  kind: Role
  name: mongodb-autoscaler-role
  apiGroup: rbac.authorization.k8s.io