apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: high-latency-flask
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      'app': 'flask'
  delay:
    latency: '500ms'
    correlation: '100'
    jitter: '0ms'
  direction: to
  duration: '15m'
