apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: high-latency-mongos
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      'role': mongos
  delay:
    latency: '500ms'
    correlation: '100'
    jitter: '0ms'
  direction: both  # colpisce sia il traffico in entrata (Flaskâ†’mongos)
                   # che in uscita (mongosâ†’shard) per simulare degrado reale
  duration: '15m'