apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: stress-mongodb-shard
spec:
  mode: all                  # colpisce tutti i pod del replica set
  selector:
    labelSelectors:
      'app': shard1          # ← label dei tuoi pod MongoDB
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: '5m'