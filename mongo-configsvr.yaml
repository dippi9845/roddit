apiVersion: v1
kind: Service
metadata:
  name: config-svc
spec:
  clusterIP: None
  selector:
    app: configsvr
  ports:
    - port: 27019
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: configsvr
spec:
  serviceName: config-svc
  replicas: 1
  selector:
    matchLabels:
      app: configsvr
  template:
    metadata:
      labels:
        app: configsvr
    spec:
      containers:
      - name: mongo
        image: mongo:6
        command:
          - mongod
          - "--configsvr"
          - "--replSet=configRepl"
          - "--port=27019"
          - "--bind_ip_all"
        volumeMounts:
          - name: data
            mountPath: /data/configdb
        readinessProbe:
          exec:
            command:
              - mongosh
              - "--port=27019"
              - "--eval"
              - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-configrs
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-configrs
        image: mongo:6
        command:
        - bash
        - -c
        - |
          CONFIGSVR="configsvr-0.config-svc.default.svc.cluster.local"
          until mongosh --host "$CONFIGSVR" --port 27019 --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for configsvr-0..."
            sleep 3
          done

          echo "Initializing configRepl..."
          mongosh --host "$CONFIGSVR" --port 27019 --eval \
            "rs.initiate({
              _id: 'configRepl',
              configsvr: true,
              members: [{ _id: 0, host: '$CONFIGSVR:27019' }]
            })"
          STATUS=$(mongosh --host "$CONFIGSVR" --port 27019 \
            --quiet --eval "try { rs.status().ok } catch(e) { 0 }")
          if [ "$STATUS" != "1" ]; then
            echo "Initializing configRepl..."
            mongosh --host "$CONFIGSVR" --port 27019 --eval "rs.initiate({...})"
          else
            echo "configRepl already initialized, skipping."
          fi