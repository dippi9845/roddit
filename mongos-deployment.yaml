apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
spec:
  replicas: 1
  selector:
    matchLabels:
      role: mongos
  template:
    metadata:
      labels:
        role: mongos
    spec:
      initContainers:
      # Aspetta che il replica set del configsvr sia eleggibile
      # (il Job init-configrs l'avrà già inizializzato).
      - name: wait-configsvr
        image: mongo:6
        command:
        - bash
        - -c
        - |
          CONFIGSVR="configsvr-0.config-svc.default.svc.cluster.local"
          until [ "$(mongosh --host "$CONFIGSVR" --port 27019 \
            --quiet --eval \
            "try { rs.status().ok } catch(e) { 0 }")" = "1" ]; do
            echo "Waiting for configsvr primary..."
            sleep 3
          done
          echo "configsvr ready."

      # Aspetta che lo shard abbia un primary su almeno un membro.
      - name: wait-shard
        image: mongo:6
        command:
        - bash
        - -c
        - |
          until \
            [ "$(mongosh --host shard1-0.shard1.default.svc.cluster.local \
              --port 27018 --quiet \
              --eval "try { rs.isMaster().ismaster } catch(e) { false }")" = "true" ] || \
            [ "$(mongosh --host shard1-1.shard1.default.svc.cluster.local \
              --port 27018 --quiet \
              --eval "try { rs.isMaster().ismaster } catch(e) { false }")" = "true" ] || \
            [ "$(mongosh --host shard1-2.shard1.default.svc.cluster.local \
              --port 27018 --quiet \
              --eval "try { rs.isMaster().ismaster } catch(e) { false }")" = "true" ]; do
            echo "Waiting for shard1 primary..."
            sleep 3
          done
          echo "shard1 ready."

      containers:
      - name: mongos
        image: mongo:6
        command:
        - "mongos"
        - "--configdb"
        - "configRepl/configsvr-0.config-svc.default.svc.cluster.local:27019"
        - "--bind_ip_all"
        ports:
        - containerPort: 27017
        readinessProbe:
          exec:
            command:
              - mongosh
              - "--eval"
              - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: batch/v1
kind: Job
metadata:
  name: add-shard
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: add-shard
        image: mongo:6
        command:
        - bash
        - -c
        - |
          until mongosh --host mongos --port 27017 \
            --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for mongos..."
            sleep 3
          done

          SHARDS=$(mongosh --host mongos --port 27017 --quiet \
            --eval "db.adminCommand('listShards').shards.length")
          if [ "$SHARDS" = "0" ]; then
            echo "Adding shard1..."
            mongosh --host mongos --port 27017 --eval \
              "sh.addShard('shard1/shard1-0.shard1.default.svc.cluster.local:27018,shard1-1.shard1.default.svc.cluster.local:27018,shard1-2.shard1.default.svc.cluster.local:27018')"
            echo "Done."
          else
            echo "Shard already present, skipping."
          fi