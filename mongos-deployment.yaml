apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
spec:
  replicas: 1
  selector:
    matchLabels:
      role: mongos
  template:
    metadata:
      labels:
        role: mongos
    spec:
      initContainers:
      - name: wait-configsvr
        image: mongo:6
        command:
        - bash
        - -c
        - |
          until mongosh --host configsvr-0.config-svc.default.svc.cluster.local --port 27019 --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for configsvr..."
            sleep 3
          done
      - name: wait-shard
        image: mongo:6
        command:
        - bash
        - -c
        - |
          until mongosh --host shard1-0.shard1.default.svc.cluster.local --port 27018 --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for shard1..."
            sleep 3
          done
      containers:
      - name: mongos
        image: mongo:6
        command:
        - "mongos"
        - "--configdb"
        - "configRepl/configsvr-0.config-svc.default.svc.cluster.local:27019"
        - "--bind_ip_all"
        ports:
        - containerPort: 27017
        readinessProbe:
          exec:
            command:
              - mongosh
              - "--eval"
              - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: batch/v1
kind: Job
metadata:
  name: add-shard
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: add-shard
        image: mongo:6
        command:
        - bash
        - -c
        - |
          until mongosh --host mongos --port 27017 --eval "db.adminCommand('ping')" &>/dev/null; do
            echo "Waiting for mongos..."
            sleep 3
          done
          SHARDS=$(mongosh --host mongos --port 27017 --quiet --eval "sh.status().shards.map(s=>s._id).join(',')")
          if echo "$SHARDS" | grep -q "shard1"; then
            echo "shard1 already registered, skipping."
          else
            echo "Adding shard1..."
            mongosh --host mongos --port 27017 \
              --eval "sh.addShard('shard1/shard1-0.shard1.default.svc.cluster.local:27018')"
          fi